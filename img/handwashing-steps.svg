<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" role="img" aria-label="Correct handwashing steps for food handlers: wet hands with warm running water, apply soap, scrub for about 20 seconds, rinse, and dry with a single-use towel">
  <style>
    .t{font-family:Arial,Helvetica,sans-serif;}
    .title{font-size:18px;fill:#1A1F1C;font-weight:700;}
    .num{font-size:16px;fill:#fff;font-weight:700;}
    .step{font-size:13px;fill:#1A1F1C;font-weight:700;}
    .desc{font-size:11px;fill:#5C6760;}
    .cap{font-size:11px;fill:#5C6760;}
  </style>
  <rect width="560" height="300" fill="#FFFFFF"/>
  <text x="24" y="34" class="t title">Handwashing Steps for Food Handlers</text>

  <!-- 5 columns -->
  <g>
    <!-- 1 -->
    <circle cx="80"  cy="92" r="30" fill="#059669"/><text x="73" y="98" class="t num">1</text>
    <text x="80" y="150" text-anchor="middle" class="t step">Wet</text>
    <text x="80" y="168" text-anchor="middle" class="t desc">Warm running water</text>

    <circle cx="200" cy="92" r="30" fill="#059669"/><text x="193" y="98" class="t num">2</text>
    <text x="200" y="150" text-anchor="middle" class="t step">Soap</text>
    <text x="200" y="168" text-anchor="middle" class="t desc">Apply liquid soap</text>

    <circle cx="320" cy="92" r="30" fill="#059669"/><text x="313" y="98" class="t num">3</text>
    <text x="320" y="150" text-anchor="middle" class="t step">Scrub</text>
    <text x="320" y="168" text-anchor="middle" class="t desc">~20 sec, incl. nails</text>

    <circle cx="440" cy="92" r="30" fill="#059669"/><text x="433" y="98" class="t num">4</text>
    <text x="440" y="150" text-anchor="middle" class="t step">Rinse</text>
    <text x="440" y="168" text-anchor="middle" class="t desc">Under clean water</text>

    <circle cx="520" cy="220" r="0" fill="none"/>
    <circle cx="280" cy="220" r="30" fill="#047857"/><text x="273" y="226" class="t num">5</text>
    <text x="280" y="278" text-anchor="middle" class="t step">Dry</text>
    <text x="280" y="296" text-anchor="middle" class="t desc">Single-use paper towel</text>

    <!-- arrows -->
    <line x1="116" y1="92" x2="164" y2="92" stroke="#A7F3D0" stroke-width="4"/>
    <line x1="236" y1="92" x2="284" y2="92" stroke="#A7F3D0" stroke-width="4"/>
    <line x1="356" y1="92" x2="404" y2="92" stroke="#A7F3D0" stroke-width="4"/>
  </g>
  <text x="24" y="210" class="t desc">Wash before handling food, after handling raw food, after the toilet, and after touching face, hair or rubbish.</text>
</svg>
